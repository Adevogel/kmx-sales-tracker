<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KMX Technologies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/* ═══════════════════════════════════════════
   KMX TECHNOLOGIES - DESIGN SYSTEM v3
   One file. One source of truth. Zero patches.
═══════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}

/* ── TOKENS ─────────────────────────────── */
:root{
  /* ── DARK THEME: Deep Ocean ── */
  /* Surfaces - deep water blacks with blue undertone */
  --s0:#060A12; --s1:#0A1628; --s2:#0F1E36; --s3:#162540;
  /* Borders - blue-tinted */
  --b0:#1A2E48; --b1:#1E3858; --b2:#264870;
  /* Text - crisp coastal whites */
  --t0:#E8F4FF; --t1:#7AACCF; --t2:#3D6A8A; --t3:#1E3D55;
  /* Accent - cyan aqua (water surface light) */
  --lime:#38E8C8; --lime2:#20C4A8;
  --lime-a10:rgba(56,232,200,.10); --lime-a18:rgba(56,232,200,.18);
  --lime-a30:rgba(56,232,200,.30);
  /* Semantic */
  --green:#22D47A;  --green-a12:rgba(34,212,122,.12);
  --red:#E05A5A;    --red-a12:rgba(224,90,90,.12);
  --amber:#E8A030;  --amber-a12:rgba(232,160,48,.12);
  --blue:#4E9EF0;   --blue-a12:rgba(78,158,240,.12);
  --purple:#7B6CF6; --purple-a12:rgba(123,108,246,.12);
  --teal:#20D4E8;   --teal-a12:rgba(32,212,232,.12);
  /* Stage colours - water spectrum: shallow to deep */
  --col-prospect:#3D6A8A;  /* deep slate water */
  --col-scoping:#4E9EF0;   /* open sky blue */
  --col-proposal:#7B6CF6;  /* deep reef purple */
  --col-lab:#E8A030;       /* sunset amber */
  --col-demo:#E8609A;      /* coral pink */
  --col-negotiation:#20D4E8; /* bright teal surf */
  --col-won:#38E8C8;        /* aqua - glowing */
  --col-lost:#E05A5A;       /* warning red */
  /* Fonts */
  --f-ui:'Inter',sans-serif;
  --f-disp:'Space Grotesk',sans-serif;
  --f-mono:'IBM Plex Mono',monospace;
  /* Radii */
  --r1:4px; --r2:8px; --r3:12px; --r4:16px; --r5:20px;
  /* Nav */
  --nav:60px; --nav-open:220px;
}

html,body{height:100%;font-family:var(--f-ui);background:var(--s0);color:var(--t0);font-size:14px;line-height:1.5;overflow-x:hidden}

/* ── SHELL ─────────────────────────────── */
#app{display:none;min-height:100vh}
.shell{display:flex;min-height:100vh}
.pg{display:none}.pg.on{display:block}

/* ── TOP NAV ─────────────────────────────── */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:52px;
  background:var(--s1);
  border-bottom:1px solid var(--b0);
  display:flex;align-items:center;
  padding:0 20px;
  gap:0;
}
.nav-brand{
  display:flex;align-items:center;gap:10px;
  margin-right:24px;flex-shrink:0;
}
.nav-logo{
  width:28px;height:28px;border-radius:var(--r1);
  background:var(--lime);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;box-shadow:0 0 10px var(--lime-a30);
}
.nav-logo svg{width:14px;height:14px;fill:none;stroke:#060A12;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.nav-name{font-family:var(--f-disp);font-size:14px;font-weight:700;color:var(--t0);white-space:nowrap;letter-spacing:-.01em}
.nav-divider{width:1px;height:20px;background:var(--b1);margin:0 8px;flex-shrink:0}
.nav-body{display:flex;align-items:center;gap:2px;flex:1}
.ni{
  display:flex;align-items:center;gap:7px;
  height:36px;padding:0 12px;
  border:none;background:none;
  font-family:var(--f-ui);font-size:13px;font-weight:500;
  color:var(--t2);cursor:pointer;
  border-radius:var(--r2);
  transition:all .12s;white-space:nowrap;
  position:relative;
}
.ni i{font-size:16px;flex-shrink:0}
.ni-lbl{font-size:13px}
.ni:hover{background:var(--s2);color:var(--t1)}
.ni.on,.ni.active{color:var(--lime);background:var(--lime-a10)}
.ni.on::after,.ni.active::after{
  content:'';position:absolute;bottom:-8px;left:12px;right:12px;
  height:2px;background:var(--lime);border-radius:2px 2px 0 0;
}
.nav-sect-label{display:none}
.nav-foot{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--t3);flex-shrink:0;transition:all .3s}
.sync-dot.ok{background:var(--green);box-shadow:0 0 6px rgba(34,196,122,.5)}
.sync-dot.err{background:var(--red);box-shadow:0 0 6px rgba(224,82,82,.5)}
.sync-dot.busy{background:var(--amber);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-meta{display:flex;align-items:center;gap:6px}
.sync-lbl{font-size:11px;color:var(--t2);font-family:var(--f-mono)}
.sync-btn{background:none;border:none;cursor:pointer;color:var(--t2);font-size:15px;padding:4px;border-radius:var(--r1);transition:all .1s}
.sync-btn:hover{color:var(--t0);background:var(--s2)}
.spin{animation:rot .9s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

/* ── MAIN ──────────────────────────────── */
.main{margin-top:52px;flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{height:44px;background:var(--s0);border-bottom:1px solid var(--b0);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-crumb{font-size:11px;color:var(--t2);font-family:var(--f-mono);letter-spacing:.06em;text-transform:uppercase}
.topbar-sep{color:var(--t3);font-size:13px}
.topbar-title{font-family:var(--f-disp);font-size:17px;font-weight:600;color:var(--t0);letter-spacing:-.01em}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-date{font-family:var(--f-mono);font-size:11px;color:var(--t2);padding:5px 10px;border:1px solid var(--b0);border-radius:var(--r1)}

/* ── PAGES ─────────────────────────────── */
.pg{display:none;padding:24px 24px 80px;min-height:calc(100vh - 54px)}
.pg.on{display:block}

/* ── BUTTONS ───────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:7px;height:34px;padding:0 14px;font-family:var(--f-ui);font-size:13px;font-weight:500;border-radius:var(--r2);cursor:pointer;border:1px solid var(--b1);background:var(--s2);color:var(--t1);transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--s3);color:var(--t0);border-color:var(--b2)}
.btn i{font-size:15px}
.btn-p{background:var(--lime);color:#07090D;border-color:transparent;font-weight:600}
.btn-p:hover{background:var(--lime2);color:#07090D;box-shadow:0 2px 12px var(--lime-a30)}
.btn-g{background:none;border-color:transparent;color:var(--t2)}
.btn-g:hover{background:var(--s2);color:var(--t0);border-color:var(--b0)}
.btn-d:hover{background:var(--red-a12);color:var(--red);border-color:rgba(224,82,82,.3)}

/* ── TOOLBAR ───────────────────────────── */
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.sw{position:relative;flex:1;min-width:180px;max-width:280px}
.sw i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--t2);font-size:14px;pointer-events:none}
.si-inp{width:100%;padding:7px 10px 7px 32px;background:var(--s2);border:1px solid var(--b0);border-radius:var(--r2);color:var(--t0);font-size:13px;font-family:var(--f-ui);outline:none;transition:border-color .12s}
.si-inp:focus{border-color:var(--b2)}
.si-inp::placeholder{color:var(--t3)}
.sel{height:34px;padding:0 10px;background:var(--s2);border:1px solid var(--b0);border-radius:var(--r2);color:var(--t1);font-size:13px;font-family:var(--f-ui);outline:none;cursor:pointer;line-height:1;appearance:auto;-webkit-appearance:auto}
.sel option{background:var(--s2)}
.fsel{height:34px;padding:0 10px;background:var(--s2);border:1px solid var(--b0);border-radius:var(--r2);color:var(--t1);font-size:13px;font-family:var(--f-ui);outline:none;cursor:pointer;line-height:1}
.fsel option{background:var(--s2)}
.filter-sel{height:34px;padding:0 10px;background:var(--s2);border:1px solid var(--b0);border-radius:var(--r2);color:var(--t1);font-size:13px;font-family:var(--f-ui);outline:none;cursor:pointer}

/* ── TABLE ─────────────────────────────── */
.tbl-card{background:var(--s1);border:1px solid var(--b0);border-radius:var(--r3);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
thead{background:var(--s0)}
thead th{padding:10px 14px;text-align:left;font-size:10px;font-weight:600;color:var(--t2);letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid var(--b0);cursor:pointer;user-select:none;white-space:nowrap;font-family:var(--f-mono);transition:color .1s}
thead th:hover{color:var(--t1)}
thead th.sorted{color:var(--lime)}
.sort-i{font-size:9px;opacity:.35;margin-left:3px}
thead th.sorted .sort-i{opacity:1}
tbody tr{border-bottom:1px solid var(--b0);transition:background .08s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--s2)}
td{padding:12px 14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t0)}
.ca{white-space:normal;vertical-align:top;padding-top:10px;text-align:right}
.cn{width:18%}.co{width:8%}.cst{width:13%}.ch{width:8%}.cv{width:11%}.cl{width:9%}.cage{width:7%}.cfu{width:8%}.ca{width:6%;text-align:right}
.ce,.cdl,.cinfra,.cnote{display:none}
.cdep{width:8%}
.cn{width:14%}.co{width:7%}.cst{width:11%}.ch{width:7%}.cv{width:10%}.cl{width:8%}.cage{width:6%}.cfu{width:7%}.cdep{width:8%}.ca{width:6%;text-align:right}

/* Stage pills */
.sp{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 8px;border-radius:var(--r1);font-weight:500;white-space:nowrap;font-family:var(--f-mono);border-left:2px solid currentColor;background:rgba(255,255,255,.03)}
.sp.prospect{color:var(--col-prospect)} .sp.scoping{color:var(--col-scoping)}
.sp.proposal{color:var(--col-proposal)} .sp.lab{color:var(--col-lab)}
.sp.demo{color:var(--col-demo)}         .sp.negotiation{color:var(--col-negotiation)}
.sp.won{color:var(--col-won);animation:wonpulse 2.2s ease-in-out infinite}
.sp.lost{color:var(--col-lost)}
@keyframes wonpulse{0%,100%{border-color:rgba(56,232,200,.35);box-shadow:none}50%{border-color:var(--lime);box-shadow:0 0 8px var(--lime-a30)}}

/* Health dots */
.hb{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--t1)}
.hd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.hd.green{background:var(--green);box-shadow:0 0 6px rgba(34,196,122,.6)}
.hd.yellow{background:var(--amber);box-shadow:0 0 6px rgba(224,152,50,.6)}
.hd.red{background:var(--red);box-shadow:0 0 6px rgba(224,82,82,.6)}

/* Data values */
.vtbd{color:var(--t3);font-style:italic;font-size:12px;font-family:var(--f-mono)}
.vk{font-family:var(--f-mono);font-size:12px;font-weight:500}
.vr{font-family:var(--f-mono);font-size:11px;color:var(--t2)}
.raction{display:flex;gap:2px;justify-content:flex-end;align-items:flex-start}
.ib{background:none;border:none;cursor:pointer;color:var(--t3);padding:5px;border-radius:var(--r1);font-size:14px;display:inline-flex;align-items:center;transition:all .1s}
.ib:hover{color:var(--t0);background:var(--s3)}
.ib.del:hover{color:var(--red);background:var(--red-a12)}
.ib.win:hover{color:var(--green);background:var(--green-a12)}
.fu-over{font-family:var(--f-mono);font-size:11px;font-weight:600;color:var(--red)}
.fu-soon{font-family:var(--f-mono);font-size:11px;font-weight:600;color:var(--amber)}
.fu-ok{font-family:var(--f-mono);font-size:11px;color:var(--t2)}
.dl-tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:2px 6px;border-radius:var(--r1);font-weight:500;white-space:nowrap;font-family:var(--f-mono)}
.dl-tag.ok{color:var(--t2)}
.dl-tag.amber{background:var(--amber-a12);color:var(--amber);border:1px solid rgba(224,152,50,.25)}
.dl-tag.danger{background:var(--red-a12);color:var(--red);border:1px solid rgba(224,82,82,.3);animation:flash 1.8s infinite}
.dl-tag.overdue{background:rgba(224,82,82,.2);color:#ff8080;border:1px solid rgba(224,82,82,.4)}
@keyframes flash{0%,100%{opacity:1}50%{opacity:.5}}
.infra-pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:var(--r1);font-weight:500;letter-spacing:.03em;white-space:nowrap;font-family:var(--f-mono)}
.infra-pill.datacenter{background:var(--blue-a12);color:var(--blue)}
.infra-pill.foodbev{background:var(--amber-a12);color:var(--amber)}
.infra-pill.municipal{background:var(--green-a12);color:var(--green)}
.infra-pill.oilgas{background:var(--red-a12);color:var(--red)}
.infra-pill.lithium{background:var(--purple-a12);color:var(--purple)}
.infra-pill.minerals{background:var(--teal-a12);color:var(--teal)}
.infra-pill.mining{background:var(--lime-a10);color:var(--lime2)}
.infra-pill.industrial{background:rgba(212,96,138,.12);color:#D4608A}
.infra-pill.chipfab{background:var(--green-a12);color:var(--green)}
.infra-pill.power{background:var(--amber-a12);color:#E8901E}
.lic-type{font-family:var(--f-mono);font-size:10px;padding:2px 7px;border-radius:var(--r1);background:var(--blue-a12);color:var(--blue);font-weight:500}
.lic-status{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 8px;border-radius:var(--r1);font-weight:500;white-space:nowrap;font-family:var(--f-mono)}
.lic-status::before{content:'';width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0}
.lic-status.active{background:var(--green-a12);color:var(--green)}
.lic-status.expiring{background:var(--amber-a12);color:var(--amber)}
.lic-status.expired{background:var(--red-a12);color:var(--red)}
.lic-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.empty{text-align:center;padding:3.5rem;color:var(--t2);font-size:13px;font-family:var(--f-mono)}
.empty i{font-size:28px;display:block;margin-bottom:8px;opacity:.2}

/* ── GRID ──────────────────────────────── */
.grid{display:grid;gap:12px}
.g4{grid-template-columns:repeat(4,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
.mt{margin-top:12px}
/* Aliases so old renderDash class names still work */
.kgrid{display:grid;gap:12px}
.kgrid.k4,.k4{grid-template-columns:repeat(4,1fr)}
.kgrid.k3,.k3{grid-template-columns:repeat(3,1fr)}
.kgrid.k2,.k2{grid-template-columns:repeat(2,1fr)}
.kgrid.gap,.gap{margin-top:12px}
.dgrid{display:grid;gap:12px}
.dgrid.r4{grid-template-columns:repeat(4,1fr)}
.dgrid.r3{grid-template-columns:repeat(3,1fr)}
.dgrid.r2{grid-template-columns:repeat(2,1fr)}
.dgrid.gap{margin-top:12px}

/* ── KPI CARDS ─────────────────────────── */
.kcard{background:var(--s1);border:1px solid var(--b0);border-radius:var(--r3);padding:20px;position:relative;overflow:hidden;transition:border-color .15s,transform .15s}
.kcard:hover{border-color:var(--b1);transform:translateY(-1px)}
/* Top accent line */
.kcard::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;border-radius:0 0 var(--r1) var(--r1);opacity:.8}
.kcard.k-lime::before,.kcard.k-neon::before,.kcard.k-gold::before{background:var(--lime)}
.kcard.k-green::before{background:var(--green)}
.kcard.k-red::before{background:var(--red)}
.kcard.k-amber::before{background:var(--amber)}
.kcard.k-blue::before{background:var(--blue)}
.kcard.k-purple::before{background:var(--purple)}
.kcard.k-teal::before{background:var(--teal)}
/* Old aliases */
.kc{background:var(--s1);border:1px solid var(--b0);border-radius:var(--r3);padding:20px;position:relative;overflow:hidden;transition:border-color .15s,transform .15s}
.kc:hover{border-color:var(--b1);transform:translateY(-1px)}
.kc::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;border-radius:0 0 var(--r1) var(--r1);opacity:.8}
.kc.ta,.kc.k-neon,.kc.k-lime{} .kc.ta::before,.kc.k-neon::before,.kc.k-lime::before{background:var(--lime)}
.kc.tb,.kc.k-blue{} .kc.tb::before,.kc.k-blue::before{background:var(--blue)}
.kc.tg,.kc.k-green{} .kc.tg::before,.kc.k-green::before{background:var(--green)}
.kc.ty,.kc.k-amber{} .kc.ty::before,.kc.k-amber::before{background:var(--amber)}
.kc.tr,.kc.k-red{} .kc.tr::before,.kc.k-red::before{background:var(--red)}
.kc.tp,.kc.k-purple{} .kc.tp::before,.kc.k-purple::before{background:var(--purple)}
.kc.tt,.kc.k-teal{} .kc.tt::before,.kc.k-teal::before{background:var(--teal)}
.kc.ga::after,.kc.gg::after,.kc.gr::after{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;opacity:.04;pointer-events:none}
.kc.ga::after{background:var(--lime)} .kc.gg::after{background:var(--green)} .kc.gr::after{background:var(--red)}
.klbl{font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;display:flex;align-items:center;gap:6px;font-family:var(--f-mono)}
.klbl i{font-size:13px}
.kval{font-family:var(--f-disp);font-size:36px;font-weight:700;letter-spacing:-.03em;line-height:1;color:var(--t0)}
.kval.sm{font-size:22px}
/* Value colour classes - all aliases covered */
.kval.ca,.kval.v-gold,.kval.v-lime{color:var(--lime)}
.kval.cb,.kval.v-blue{color:var(--blue)}
.kval.cg,.kval.v-green{color:var(--green)}
.kval.cy,.kval.v-amber{color:var(--amber)}
.kval.cr,.kval.v-red{color:var(--red)}
.kval.v-purple{color:var(--purple)}
.kval.v-teal{color:var(--teal)}
.ksub{font-size:11px;color:var(--t2);margin-top:8px;font-family:var(--f-mono)}
.ksub b{color:var(--t1);font-weight:500}

/* ── SECTION CARDS ─────────────────────── */
.scard,.rcard,.chcard,.bchcard{background:var(--s1);border:1px solid var(--b0);border-radius:var(--r3);padding:20px}
.scardtitle,.rcardtitle,.chtitle,.bchcard-title{font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:16px;font-family:var(--f-mono);display:flex;align-items:center;justify-content:space-between}
.rbadge{font-size:10px;padding:2px 7px;border-radius:var(--r1);background:var(--red-a12);color:var(--red);font-weight:600;font-family:var(--f-mono)}

/* Stage bars */
.srows{display:flex;flex-direction:column;gap:10px}
.srow{display:flex;align-items:center;gap:10px}
.srname{font-size:11px;color:var(--t1);width:100px;flex-shrink:0;display:flex;align-items:center;gap:6px;font-family:var(--f-mono)}
.srname::before{content:'';width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0}
.sbw{flex:1;background:var(--s0);border-radius:2px;height:4px;overflow:hidden}
.sb{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.22,1,.36,1)}
.sb.won-bar{animation:wonbar 2.2s ease-in-out infinite}
@keyframes wonbar{0%,100%{opacity:.6}50%{opacity:1;filter:drop-shadow(0 0 4px rgba(56,232,200,.5))}}
.sc{font-family:var(--f-mono);font-size:11px;color:var(--t2);width:24px;text-align:right;flex-shrink:0}

/* Attention rows */
.rrows{display:flex;flex-direction:column;gap:1px}
.rrow{display:flex;align-items:center;justify-content:space-between;padding:9px 10px;border-radius:var(--r2);transition:background .08s}
.rrow:hover{background:var(--s2)}
.rname{font-size:13px;font-weight:500;color:var(--t0);font-family:var(--f-disp)}
.rdetail{font-size:11px;color:var(--t2);margin-top:1px;font-family:var(--f-mono)}
.nodata{text-align:center;padding:2.5rem;color:var(--t2);font-size:12px;opacity:.5;font-family:var(--f-mono)}

/* ── CHARTS ────────────────────────────── */
.chart-wrap{position:relative}
.chart-wrap.bar{height:200px}
.chart-wrap.donut{max-width:240px;margin:0 auto}

/* ── BRIEFING ───────────────────────────── */
.briefing-card{background:linear-gradient(135deg,rgba(56,232,200,.05),rgba(78,158,240,.04));border:1px solid var(--b1);border-radius:var(--r3);padding:18px 20px;margin-bottom:12px;display:flex;align-items:flex-start;gap:14px}
.briefing-icon{width:36px;height:36px;border-radius:var(--r2);background:var(--lime-a18);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--lime);flex-shrink:0}
.briefing-title{font-family:var(--f-disp);font-size:14px;font-weight:600;color:var(--t0);margin-bottom:5px;letter-spacing:-.01em}
.briefing-body{font-size:12px;color:var(--t1);line-height:1.7;font-family:var(--f-mono)}
.briefing-body b{color:var(--t0)}
.hi-red{color:var(--red);font-weight:600}
.hi-gold,.hi-lime{color:var(--lime);font-weight:600}
.hi-green{color:var(--green);font-weight:600}
.hi-amber{color:var(--amber);font-weight:600}

/* ── ALERT BANNER ──────────────────────── */
.alert-banner{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--r2);margin-bottom:10px;font-size:12px;font-family:var(--f-mono);background:var(--red-a12);border:1px solid rgba(224,82,82,.25);color:#ff9090}
.alert-banner i{font-size:15px;flex-shrink:0;color:var(--red)}

/* ── COVERAGE BAR ──────────────────────── */
.coverage-bar-wrap{background:var(--s0);border-radius:2px;height:8px;overflow:hidden;margin-bottom:4px}
.coverage-bar{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.22,1,.36,1)}

/* ── OWNER TABLE ───────────────────────── */
.owner-table{width:100%;border-collapse:collapse;font-size:12px}
.owner-table th{font-size:9px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.1em;padding:6px 8px;border-bottom:1px solid var(--b0);text-align:left;font-family:var(--f-mono)}
.owner-table td{padding:9px 8px;border-bottom:1px solid var(--b0);color:var(--t0);font-family:var(--f-mono)}
.owner-table tbody tr:last-child td{border-bottom:none}
.owner-table tbody tr:hover td{background:var(--s2)}
.owner-table .num{text-align:right;color:var(--t1)}

/* ── ACTION / LOSS / INFRA ROWS ────────── */
.action-row{display:flex;align-items:center;padding:9px 10px;border-radius:var(--r2);border-bottom:1px solid var(--b0);transition:background .08s}
.action-row:last-child{border-bottom:none}
.action-row:hover{background:var(--s2)}
.action-co{font-size:13px;font-weight:500;color:var(--t0);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--f-disp)}
.action-meta{font-size:10px;color:var(--t2);margin-top:1px;font-family:var(--f-mono)}
.action-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;margin-left:10px}
.action-date-overdue{font-family:var(--f-mono);font-size:11px;font-weight:600;color:var(--red)}
.action-date-soon{font-family:var(--f-mono);font-size:11px;font-weight:600;color:var(--amber)}
.loss-row,.infra-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--b0)}
.loss-row:last-child,.infra-row:last-child{border-bottom:none}
.loss-label,.infra-row-label{font-size:11px;color:var(--t1);width:110px;flex-shrink:0;font-family:var(--f-mono)}
.loss-bar-wrap,.infra-bar-wrap{flex:1;background:var(--s0);border-radius:2px;height:4px;overflow:hidden}
.loss-bar{height:100%;border-radius:2px;background:var(--red)}
.infra-bar{height:100%;border-radius:2px}
.loss-count,.infra-count{font-family:var(--f-mono);font-size:11px;color:var(--t2);width:20px;text-align:right;flex-shrink:0}

/* ── HIGHLIGHTS ────────────────────────── */
.hlrow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.hlc{background:var(--s1);border:1px solid var(--b0);border-radius:var(--r3);padding:16px 18px;display:flex;align-items:center;gap:12px}
.hlic{width:36px;height:36px;border-radius:var(--r2);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.hlic.a{background:var(--lime-a18);color:var(--lime)}
.hlic.g{background:var(--green-a12);color:var(--green)}
.hlic.b{background:var(--blue-a12);color:var(--blue)}
.hlic.y{background:var(--amber-a12);color:var(--amber)}
.hlic.r{background:var(--red-a12);color:var(--red)}
.hllbl{font-size:10px;color:var(--t2);margin-bottom:3px;font-family:var(--f-mono);text-transform:uppercase;letter-spacing:.06em}
.hlval{font-family:var(--f-disp);font-size:17px;font-weight:600;color:var(--t0)}
.hlval.a{color:var(--lime)}.hlval.g{color:var(--green)}.hlval.r{color:var(--red)}

/* ── FUNNEL ────────────────────────────── */
.funnel-wrap{padding:4px 0}
.funnel-header{display:flex;align-items:center;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--b0)}
.fh-stage{width:120px;flex-shrink:0;font-size:9px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.1em;text-align:right;padding-right:12px;font-family:var(--f-mono)}
.fh-bar{flex:1}
.fh-count{width:56px;flex-shrink:0;font-size:9px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.1em;text-align:right;padding-right:4px;font-family:var(--f-mono)}
.fh-conv{width:80px;flex-shrink:0;font-size:9px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.1em;text-align:right;font-family:var(--f-mono)}
.funnel-row{display:flex;align-items:center;margin-bottom:4px}
.fd-stage{width:120px;flex-shrink:0;font-size:11px;font-weight:500;text-align:right;padding-right:12px;font-family:var(--f-mono)}
.fd-bar-wrap{flex:1;display:flex;align-items:center}
.fd-bar{height:26px;border-radius:var(--r1);min-width:4px;display:flex;align-items:center;padding:0 10px;transition:width .7s cubic-bezier(.22,1,.36,1)}
.fd-bar-lbl{font-size:10px;font-weight:600;font-family:var(--f-mono);color:rgba(7,9,13,.9);white-space:nowrap}
.fd-count{width:56px;flex-shrink:0;font-family:var(--f-mono);font-size:12px;font-weight:600;text-align:right;padding-right:4px}
.fd-conv{width:80px;flex-shrink:0;font-family:var(--f-mono);font-size:11px;font-weight:500;text-align:right}
.funnel-gap{display:flex;align-items:center;margin:2px 0}
.funnel-gap-spacer{width:120px;flex-shrink:0;padding-right:12px}
.funnel-gap-line{flex:1;display:flex;align-items:center;gap:6px;padding:2px 0 2px 14px}
.funnel-gap-arrow,.funnel-gap-text{font-size:13px;line-height:1;font-family:var(--f-mono)}
.funnel-gap-text{font-size:10px;font-weight:500}
.funnel-gap-line.flow-green .funnel-gap-arrow,.funnel-gap-line.flow-green .funnel-gap-text{color:var(--green)}
.funnel-gap-line.flow-amber .funnel-gap-arrow,.funnel-gap-line.flow-amber .funnel-gap-text{color:var(--amber)}
.funnel-gap-line.flow-red .funnel-gap-arrow,.funnel-gap-line.flow-red .funnel-gap-text{color:var(--red)}
.funnel-gap-line.flow-grey .funnel-gap-arrow,.funnel-gap-line.flow-grey .funnel-gap-text{color:var(--t3)}
.funnel-gap-right{width:136px;flex-shrink:0}
.funnel-total{display:flex;align-items:center;margin-top:14px;padding-top:12px;border-top:1px solid var(--b0)}
.funnel-total-lbl{flex:1;font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.08em;font-weight:600;text-align:right;padding-right:12px;font-family:var(--f-mono)}
.funnel-total-val{font-family:var(--f-mono);font-size:14px;font-weight:600;color:var(--lime);width:136px;text-align:right}

/* ── STUCK BADGE ───────────────────────── */
.stuck-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:var(--r1);background:var(--red-a12);color:var(--red);font-weight:600;font-family:var(--f-mono)}

/* ── EXPIRY TIERS ──────────────────────── */
.expiry-tier{border-radius:var(--r3);padding:18px 20px;margin-bottom:10px;border:1px solid transparent}
.expiry-tier.t180{background:var(--blue-a12);border-color:rgba(62,133,232,.2)}
.expiry-tier.t90{background:var(--amber-a12);border-color:rgba(224,152,50,.25)}
.expiry-tier.t30{background:var(--red-a12);border-color:rgba(224,82,82,.3);animation:tierpulse 3s ease-in-out infinite}
@keyframes tierpulse{0%,100%{border-color:rgba(224,82,82,.3)}50%{border-color:rgba(224,82,82,.65)}}
.expiry-tier-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.expiry-tier-title{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-family:var(--f-mono)}
.expiry-tier-title i{font-size:15px}
.expiry-tier.t180 .expiry-tier-title{color:var(--blue)}
.expiry-tier.t90 .expiry-tier-title{color:var(--amber)}
.expiry-tier.t30 .expiry-tier-title{color:var(--red)}
.expiry-count-badge{font-family:var(--f-mono);font-size:12px;font-weight:600;padding:2px 9px;border-radius:var(--r1)}
.expiry-tier.t180 .expiry-count-badge{background:var(--blue-a12);color:var(--blue)}
.expiry-tier.t90 .expiry-count-badge{background:var(--amber-a12);color:var(--amber)}
.expiry-tier.t30 .expiry-count-badge{background:var(--red-a12);color:var(--red)}
.expiry-items{display:flex;flex-direction:column;gap:6px}
.expiry-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:var(--r2);background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04)}
.expiry-item:hover{background:rgba(255,255,255,.04)}
.expiry-item-left{display:flex;flex-direction:column;gap:2px}
.expiry-item-name{font-size:13px;font-weight:500;color:var(--t0);font-family:var(--f-disp)}
.expiry-item-meta{font-size:10px;color:var(--t2);font-family:var(--f-mono)}
.expiry-item-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;margin-left:12px}
.expiry-days{font-family:var(--f-mono);font-size:12px;font-weight:600}
.expiry-tier.t180 .expiry-days{color:var(--blue)}
.expiry-tier.t90 .expiry-days{color:var(--amber)}
.expiry-tier.t30 .expiry-days{color:var(--red)}
.expiry-date,.expiry-cost{font-size:10px;color:var(--t2);font-family:var(--f-mono)}
.tier-empty{font-size:11px;color:var(--t2);padding:8px 0;display:flex;align-items:center;gap:6px;opacity:.6;font-family:var(--f-mono)}
.tier-empty i{font-size:13px;color:var(--green)}

/* ── MODAL ─────────────────────────────── */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.mbg.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r5);padding:28px;width:480px;max-width:96vw;max-height:92vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.8)}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.mhdr h3{font-family:var(--f-disp);font-size:18px;font-weight:600;color:var(--t0);letter-spacing:-.01em}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px}
.mgrid .full{grid-column:1/-1}
.field label{display:block;font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;font-weight:600;font-family:var(--f-mono)}
.field input,.field select,.field textarea{width:100%;font-size:13px;padding:9px 11px;background:var(--s2);border:1px solid var(--b0);border-radius:var(--r2);color:var(--t0);outline:none;font-family:var(--f-ui);transition:border-color .12s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--b2)}
.field input::placeholder,.field textarea::placeholder{color:var(--t3)}
.field textarea{resize:vertical;min-height:68px}
.field select option{background:var(--s2)}
.vmrow{display:flex;gap:5px;margin-bottom:10px}
.vmb{flex:1;padding:8px;font-size:12px;border:1px solid var(--b0);border-radius:var(--r2);background:var(--s2);color:var(--t2);cursor:pointer;text-align:center;transition:all .12s;font-family:var(--f-mono);font-weight:500}
.vmb.active{border-color:var(--lime);background:var(--lime-a18);color:var(--lime)}
.mfooter{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--b0)}

/* ── BOARD VIEW ────────────────────────── */
.board-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--b1);flex-wrap:wrap;gap:16px}
.board-brand{display:flex;align-items:center;gap:14px}
.board-logo{width:44px;height:44px;border-radius:var(--r2);background:var(--lime);display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px var(--lime-a30)}
.board-logo svg{width:22px;height:22px;fill:none;stroke:#060A12;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.board-co{font-family:var(--f-disp);font-size:26px;font-weight:700;letter-spacing:-.02em;color:var(--t0)}
.board-tagline{font-size:11px;color:var(--t2);margin-top:3px;font-family:var(--f-mono);letter-spacing:.08em;text-transform:uppercase}
.board-meta{text-align:right}
.board-date{font-family:var(--f-mono);font-size:11px;color:var(--t2)}
.board-prepared{font-size:10px;color:var(--t3);margin-top:2px;font-family:var(--f-mono);letter-spacing:.06em}
.board-export-row{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.board-export-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;background:var(--lime);color:#07090D;border:none;border-radius:var(--r2);font-size:13px;font-weight:600;font-family:var(--f-disp);cursor:pointer;transition:all .15s}
.board-export-btn:hover{background:var(--lime2);box-shadow:0 4px 16px var(--lime-a30)}
.board-export-btn i{font-size:15px}
.board-theme-toggle{height:34px;padding:0 14px;font-size:12px;border-radius:var(--r2);border:1px solid var(--b1);background:var(--s2);color:var(--t1);cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:var(--f-ui);transition:all .12s}
.board-theme-toggle:hover{background:var(--s3);color:var(--t0)}
.board-section{margin-bottom:28px}
.board-section-title{font-family:var(--f-mono);font-size:10px;font-weight:600;letter-spacing:.12em;color:var(--t2);text-transform:uppercase;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--b0);display:flex;align-items:center;gap:8px}
.board-section-title i{font-size:14px}
.board-hero{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.bhc{background:var(--s1);border:1px solid var(--b0);border-radius:var(--r3);padding:20px 18px 16px;position:relative;overflow:hidden;text-align:center}
.bhc::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px}
.bhc.gold::before{background:var(--lime)}.bhc.green::before{background:var(--green)}
.bhc.blue::before{background:var(--blue)}.bhc.red::before{background:var(--red)}.bhc.purple::before{background:var(--purple)}
.bhc-label{font-size:9px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;font-family:var(--f-mono)}
.bhc-val{font-family:var(--f-disp);font-size:36px;font-weight:700;letter-spacing:-.03em;line-height:1}
.bhc-val.gold{color:var(--lime)}.bhc-val.green{color:var(--green)}.bhc-val.blue{color:var(--blue)}
.bhc-val.red{color:var(--red)}.bhc-val.purple{color:var(--purple)}.bhc-val.sm{font-size:22px}
.bhc-sub{font-size:10px;color:var(--t2);margin-top:8px;font-family:var(--f-mono)}
.board-table{width:100%;border-collapse:collapse;font-size:12px}
.board-table thead th{padding:9px 12px;text-align:left;font-size:9px;font-weight:600;color:var(--t2);letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid var(--b1);font-family:var(--f-mono)}
.board-table tbody tr{border-bottom:1px solid var(--b0)}
.board-table tbody tr:last-child{border-bottom:none}
.board-table tbody tr:hover{background:var(--s2)}
.board-table td{padding:10px 12px;font-size:12px;color:var(--t0);font-family:var(--f-mono)}
.board-2col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.board-3col{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.board-lic-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.board-lic-alert{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--r2);background:var(--red-a12);border:1px solid rgba(224,82,82,.25);color:#ff9090;font-size:12px;margin-bottom:14px;font-family:var(--f-mono)}
.board-lic-alert i{font-size:15px;flex-shrink:0;color:var(--red)}
.board-footer{margin-top:36px;padding-top:18px;border-top:1px solid var(--b0);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.board-footer-left,.board-footer-right{font-size:10px;color:var(--t2);font-family:var(--f-mono)}
.board-confidential{font-size:9px;color:var(--t3);text-align:center;margin-top:8px;letter-spacing:.08em;text-transform:uppercase;font-family:var(--f-mono)}
.board-winloss{display:flex;align-items:center;gap:8px;margin-top:10px}
.wl-bar{flex:1;height:6px;border-radius:3px;overflow:hidden;background:var(--s2);display:flex}
.wl-won{background:var(--lime);transition:width .6s}.wl-lost{background:var(--red)}

/* Light theme */
body.light-theme{
  /* ── LIGHT THEME: Coastal Morning ── */
  --s0:#EEF5FB;--s1:#FFFFFF;--s2:#DFF0F8;--s3:#C8E4F4;
  --b0:#A8CCE4;--b1:#80AACC;--b2:#5A88AA;
  --t0:#0A1A28;--t1:#1E4A6A;--t2:#4A7A9A;--t3:#7AAABB;
  --lime:#0898A0;--lime2:#067078;
  --lime-a10:rgba(8,152,160,.08);--lime-a18:rgba(8,152,160,.14);--lime-a30:rgba(8,152,160,.25);
  --green:#0A7A50;--green-a12:rgba(10,122,80,.1);
  --red:#B83030;--red-a12:rgba(184,48,48,.1);
  --amber:#8A5A00;--amber-a12:rgba(138,90,0,.1);
  --blue:#1862B8;--blue-a12:rgba(24,98,184,.1);
  --purple:#5040B0;--purple-a12:rgba(80,64,176,.1);
  --teal:#0878A0;--teal-a12:rgba(8,120,160,.1);
  --col-prospect:#4A7A9A;
  --col-scoping:#1862B8;
  --col-proposal:#5040B0;
  --col-lab:#8A5A00;
  --col-demo:#A04878;
  --col-negotiation:#0878A0;
  --col-won:#0898A0;
  --col-lost:#B83030;
}
body.light-theme{background:var(--s0)}
body.light-theme .nav{background:rgba(255,255,255,.95);border-bottom-color:var(--b0);backdrop-filter:blur(12px)}
body.light-theme .topbar{background:rgba(238,245,251,.9);border-bottom-color:var(--b0)}
body.light-theme .tbl-card{background:#FFFFFF;border-color:var(--b0)}
body.light-theme thead{background:var(--s2)}
body.light-theme .kcard,.light-theme .kc{background:#FFFFFF;border-color:var(--b0)}

/* ── POLISH ─────────────────────────────────────────────── */
/* Smooth page transitions */
.pg{animation:none}
.pg.on{animation:pgfade .18s ease-out}
@keyframes pgfade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* Table hover row highlight with left accent */

/* Input focus ring consistent */
.si-inp:focus,.sel:focus{box-shadow:0 0 0 2px var(--lime-a10)}

/* Topbar shadow on scroll */
.topbar{box-shadow:0 1px 0 var(--b0)}

/* Better empty state */
.empty i{opacity:.15;margin-bottom:10px}
.empty{color:var(--t2);font-size:12px;font-family:var(--f-mono);letter-spacing:.04em}

/* Nav hover expand smooth label fade */
.ni:hover .ni-lbl{color:var(--t0)}
.ni.on:hover .ni-lbl{color:var(--lime)}

/* Briefing card accent border */
.briefing-card{border-left:3px solid var(--lime);border-radius:var(--r3)}

/* KPI card number breathing room */
.kval{padding-top:2px}

/* scard/rcard subtle top border */
.scard::before,.rcard::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--b0);display:none}

/* Funnel total row - lime accent */
.funnel-total-val{font-size:15px}

/* Board section title has icon spacing */
.board-section-title i{opacity:.6}

/* Better scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b1);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--b2)}

/* License status pill consistent sizing */
.lic-status{min-width:60px;justify-content:center}

/* Modal overlay blur */
.mbg{backdrop-filter:blur(8px)}

/* Button active press */
.btn:active{transform:scale(.98)}
.btn-p:active{transform:scale(.98)}

/* Sort indicator improvement */
.sort-i{opacity:.25;font-size:10px;margin-left:4px;transition:opacity .1s}
thead th:hover .sort-i{opacity:.6}
thead th.sorted .sort-i{opacity:1;color:var(--lime)}

/* ── License table pills (missing from rebuild) ── */
.cname{font-weight:500;font-family:var(--f-disp);color:var(--t0)}
.nt{font-size:12px;color:var(--t2);font-family:var(--f-mono);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.lic-status{display:inline-flex;align-items:center;gap:5px;font-size:10px;padding:3px 9px;border-radius:var(--r1);font-weight:500;white-space:nowrap;font-family:var(--f-mono)}
.lic-status::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.lic-status.active{background:var(--green-a12);color:var(--green)}

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbyelyzFYo_GuAkhXaKP_V1E17ZbPIwqMcj14xQrc_HrD2m74C9NCbwvbmug8NX5cIhTrQ/exec";
// Sheet names: "Sheet1" for projects, "Licenses" for licenses
const STAGES = [
  {k:"prospect",   l:"Prospect",      c:"#4A6280"},
  {k:"scoping",    l:"Scoping",       c:"#5090ff"},
  {k:"proposal",   l:"Proposal",      c:"#a070f0"},
  {k:"lab",        l:"Lab Testing",   c:"#f0b030"},
  {k:"demo",       l:"Demonstration", c:"#f070b0"},
  {k:"negotiation",l:"Negotiation",   c:"#30d0d0"},
  {k:"won",        l:"Closed Won",    c:"#D4AF37"},
  {k:"lost",       l:"Closed Lost",   c:"#f05060"},
];
const SORDER = STAGES.map(s=>s.k);

let rows=[], editId=null, sk="name", sd=1, vm="tbd";
let chartInstances = {};

// ── Lock ──────────────────────────────────────


// ── Boot ──────────────────────────────────────
async function boot(){
  buildSelects();
  renderTable();
  await loadSettings();
  syncNow();
  syncLicenses();
}

// ── Sync state ────────────────────────────────
function setSyncState(state,label){
  document.getElementById("sdot").className="sdot "+state;
  document.getElementById("slbl").textContent=label;
}

// ── Load from Sheets ──────────────────────────
function syncNow(){
  setSyncState("busy","Syncing…");
  document.getElementById("sicon").className="ti ti-refresh spin";
  fetch(GAS_URL+"?action=get&t="+Date.now())
    .then(r=>r.json())
    .then(data=>{
      rows=(data.rows||[]).map((r,i)=>({
        id:i, name:r[0]||"", owner:r[1]||"", stage:r[2]||"prospect",
        health:r[3]||"green", tbd:r[4]==="TRUE"||r[4]===true,
        value:r[5]?parseFloat(r[5]):null,
        estLow:r[6]?parseFloat(r[6]):null,
        estHigh:r[7]?parseFloat(r[7]):null,
        last:normaliseDate(r[8]), note:r[9]||"",
        renewal:normaliseDate(r[10]), deadline:normaliseDate(r[11]),
        created:normaliseDate(r[12]), stageChanged:normaliseDate(r[13]),
        infraType:r[14]||"", lossReason:r[15]||"",
        nextAction:r[16]||"", followUpDate:normaliseDate(r[17]),
        deploymentType:r[18]||"", lossNotes:r[19]||""
      }));
      renderTable();
      setSyncState("ok","Synced "+new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}));
      if(document.getElementById("page-dash").classList.contains("active")){renderDash();renderFunnel();}
    })
    .catch(()=>setSyncState("err","Could not reach Google Sheets"))
    .finally(()=>{
      document.getElementById("sicon").className="ti ti-refresh";
      if(document.getElementById("page-licdash").classList.contains("active")) renderLicDash();
    });
  // Reload settings in background on each sync
  loadSettings().then(()=>{
    if(document.getElementById("page-dash").classList.contains("active")) renderDash();
  });
}

// ── Write via GET (no-cors fire-and-forget + resync) ──
function sheetWrite(action,rowData,rowIdx){
  let url=GAS_URL+"?action="+action;
  if(rowData) url+="&row="+encodeURIComponent(JSON.stringify(rowData));
  if(rowIdx!==undefined&&rowIdx!==null) url+="&idx="+rowIdx;
  url+="&t="+Date.now();
  fetch(url,{mode:"no-cors"}).catch(()=>{});
  setTimeout(syncNow,2000);
}

// ── Helpers ───────────────────────────────────
function fmtMoney(v,short){
  if(!v&&v!==0) return null;
  if(short) return v>=1e6?"$"+(v/1e6).toFixed(1)+"M":v>=1000?"$"+Math.round(v/1000)+"k":"$"+v;
  return "$"+Number(v).toLocaleString();
}
function fmtRange(r){
  if(!r.tbd) return null;
  if(!r.estLow&&!r.estHigh) return "TBD";
  const fmt=v=>v>=1e6?"$"+(v/1e6).toFixed(1)+"M":v>=1000?"$"+Math.round(v/1000)+"k":"$"+v;
  const lo=r.estLow?fmt(r.estLow):"";
  const hi=r.estHigh?fmt(r.estHigh):"";
  return (lo&&hi)?lo+"–"+hi:lo||hi;
}
// Normalise any date format from Google Sheets into YYYY-MM-DD
function normaliseDate(d){
  if(!d) return "";
  const s = String(d).trim();
  if(!s || s==="0" || s==="") return "";
  // Already YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // DD/MM/YYYY or DD-MM-YYYY
  const dmy = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if(dmy) return `${dmy[3]}-${dmy[2].padStart(2,"0")}-${dmy[1].padStart(2,"0")}`;
  // MM/DD/YYYY
  const mdy = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if(mdy) return `${mdy[3]}-${mdy[1].padStart(2,"0")}-${mdy[2].padStart(2,"0")}`;
  // Google Sheets serial number (days since 30 Dec 1899)
  if(/^\d+$/.test(s)){
    const serial = parseInt(s);
    if(serial > 1000){ // plausible date serial
      const ms = (serial - 25569) * 86400000; // convert to Unix ms
      const dt = new Date(ms);
      if(!isNaN(dt)){
        return dt.toISOString().split("T")[0];
      }
    }
  }
  // Try native parse as last resort
  const dt = new Date(s);
  if(!isNaN(dt)) return dt.toISOString().split("T")[0];
  return "";
}
function fmtDate(d){
  const n = normaliseDate(d);
  if(!n) return "-";
  return new Date(n+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});
}
function stg(k){return STAGES.find(s=>s.k===k)||STAGES[0];}
const INFRA_LABELS={datacenter:"Data Center",foodbev:"Food and Beverage",municipal:"Municipal",oilgas:"Oil and Gas",lithium:"Lithium Concentration",minerals:"Critical Minerals",mining:"Mining",industrial:"Industrial",chipfab:"Chip Fabrication",power:"Power"};
function infraLabelShort(k){return k==="foodbev"?"F&B":infraLabel(k);}
function infraLabel(k){return INFRA_LABELS[k]||k;}

// Stage probability weights for weighted pipeline
const STAGE_WEIGHTS={prospect:0.05,scoping:0.15,proposal:0.30,lab:0.45,demo:0.55,negotiation:0.75,won:1,lost:0};

function toggleLossReason(){
  const stage=document.getElementById("fst")?.value;
  const show=stage==="lost"?"block":"none";
  const field=document.getElementById("loss-reason-field");
  const notes=document.getElementById("loss-notes-field");
  if(field) field.style.display=show;
  if(notes) notes.style.display=show;
}
function daysSince(d){
  const n = normaliseDate(d);
  if(!n) return null;
  return Math.round((Date.now()-new Date(n+"T00:00:00"))/86400000);
}
function toRow(r){
  return[r.name,r.owner,r.stage,r.health,r.tbd?"TRUE":"FALSE",r.value||"",r.estLow||"",r.estHigh||"",r.last,r.note,r.renewal||"",r.deadline||"",r.created||"",r.stageChanged||"",r.infraType||"",r.lossReason||"",r.nextAction||"",r.followUpDate||"",r.deploymentType||"",r.lossNotes||""];
}

// Returns {label, cls} for a date: null=none, amber=60days, danger=30days, overdue=past
function dateAlert(d){
  const n = normaliseDate(d);
  if(!n) return null;
  const days = Math.round((new Date(n+"T00:00:00") - Date.now()) / 86400000);
  if(days < 0)  return {label:"Overdue "+Math.abs(days)+"d", cls:"overdue"};
  if(days <= 30) return {label:days+"d left", cls:"danger"};
  if(days <= 60) return {label:days+"d left", cls:"amber"};
  return {label:fmtDate(n), cls:"ok"};
}

function getFiltered(){
  const q=document.getElementById("search").value.toLowerCase();

  return rows.filter(r=>
    (!q||r.name.toLowerCase().includes(q)||(r.owner||"").toLowerCase().includes(q))&&
    (!fh||r.health===fh)&&(!fs||r.stage===fs)
  ).sort((a,b)=>{
    let av=a[sk]??"",bv=b[sk]??"";
    if(sk==="stage"){av=SORDER.indexOf(a.stage);bv=SORDER.indexOf(b.stage);}
    if(sk==="value"){av=a.tbd?-1:(a.value||0);bv=b.tbd?-1:(b.value||0);}
    if(sk==="renewal"){av=a.renewal||"9999";bv=b.renewal||"9999";}
    if(sk==="created"){av=a.created||"9999";bv=b.created||"9999";}
    if(sk==="deploymentType"){av=a.deploymentType||"";bv=b.deploymentType||"";}
    if(sk==="infraType"){av=a.infraType||"";bv=b.infraType||"";}
    if(sk==="followUpDate"){av=a.followUpDate||"9999";bv=b.followUpDate||"9999";}
    return av<bv?-sd:av>bv?sd:0;
  });
}

// ── Pipeline target (stored in Google Sheet Settings tab) ────────────────────
let _pipelineTarget = 5000000; // local cache, updated on sync

function getPipelineTarget(){
  return _pipelineTarget;
}

function setPipelineTarget(val){
  const num = parseFloat(val) || 5000000;
  _pipelineTarget = num;
  // Write to Settings sheet via sheetWrite pattern (fire + resync)
  if(GAS_URL !== "PASTE_YOUR_SCRIPT_URL_HERE"){
    const url = GAS_URL
      + "?action=setting"
      + "&key=pipeline_target"
      + "&value=" + encodeURIComponent(num)
      + "&t=" + Date.now();
    fetch(url, {mode:"no-cors"}).catch(()=>{});
    // Re-read from sheet after short delay to confirm it saved
    setTimeout(()=>{
      loadSettings().then(()=>{
        if(document.getElementById("page-dash").classList.contains("active")) renderDash();
      });
    }, 2000);
  }
  renderDash();
}

async function loadSettings(){
  if(GAS_URL === "PASTE_YOUR_SCRIPT_URL_HERE") return;
  try {
    const res = await fetch(GAS_URL + "?action=get&sheet=settings&t=" + Date.now());
    const data = await res.json();
    // Settings sheet: col A = key, col B = value (row 1 = headers)
    (data.rows||[]).forEach(r=>{
      if(r[0]==="pipeline_target" && r[1]) _pipelineTarget = parseFloat(r[1]) || 5000000;
    });
  } catch(e){ /* use default */ }
}

function renderDash(){
  const active=rows.filter(r=>r.stage!=="won"&&r.stage!=="lost");
  const won=rows.filter(r=>r.stage==="won");
  const lost=rows.filter(r=>r.stage==="lost");
  const greens=active.filter(r=>r.health==="green").length;
  const yellows=active.filter(r=>r.health==="yellow").length;
  const reds=active.filter(r=>r.health==="red").length;
  const pipe=active.filter(r=>!r.tbd&&r.value).reduce((s,r)=>s+r.value,0);
  const wonVal=won.filter(r=>!r.tbd&&r.value).reduce((s,r)=>s+r.value,0);
  const estMid=active.filter(r=>r.tbd&&(r.estLow||r.estHigh)).reduce((s,r)=>s+((r.estLow||0)+(r.estHigh||0))/2,0);
  const wr=won.length+lost.length>0?Math.round(won.length/(won.length+lost.length)*100):null;
  const atRisk=active.filter(r=>r.health==="red");
  const stale=active.filter(r=>{const d=daysSince(r.last);return d!==null&&d>30;});
  const nearClose=active.filter(r=>r.stage==="negotiation");
  const maxCnt=Math.max(...STAGES.map(s=>rows.filter(r=>r.stage===s.k).length),1);

  // ── Weighted pipeline ──────────────────────────────
  const weightedPipe = active.filter(r=>!r.tbd&&r.value)
    .reduce((s,r)=>s+(r.value*(STAGE_WEIGHTS[r.stage]||0)),0);
  const weightedEst = active.filter(r=>r.tbd&&(r.estLow||r.estHigh))
    .reduce((s,r)=>s+((r.estLow||0)+(r.estHigh||0))/2*(STAGE_WEIGHTS[r.stage]||0),0);
  const totalWeighted = weightedPipe + weightedEst;

  // ── Deal age stats ─────────────────────────────────
  const withAge = active.filter(r=>r.created);
  const avgAge = withAge.length>0
    ? Math.round(withAge.reduce((s,r)=>s+daysSince(r.created),0)/withAge.length)
    : null;
  const oldestDeal = withAge.length>0
    ? withAge.reduce((a,b)=>daysSince(a.created)>daysSince(b.created)?a:b)
    : null;
  // Average days per stage (using stageChanged)
  const stageAges = {};
  STAGES.forEach(s=>{
    const inStage = rows.filter(r=>r.stage===s.k&&r.stageChanged);
    if(inStage.length>0){
      stageAges[s.k]=Math.round(inStage.reduce((sum,r)=>sum+daysSince(r.stageChanged),0)/inStage.length);
    }
  });

  // ── Follow-up / action items ───────────────────────
  const now = Date.now();
  const overdueFollowup = active.filter(r=>r.followUpDate&&new Date(r.followUpDate+"T00:00:00")<now);
  const dueThisWeek = active.filter(r=>{
    if(!r.followUpDate) return false;
    const d=Math.round((new Date(r.followUpDate+"T00:00:00")-now)/86400000);
    return d>=0&&d<=7;
  });
  const allDue = [...overdueFollowup,...dueThisWeek]
    .filter((r,i,a)=>a.findIndex(x=>x.id===r.id)===i)
    .sort((a,b)=>new Date(a.followUpDate)-new Date(b.followUpDate));

  // ── Infrastructure type breakdown ──────────────────
  const infraCounts={};
  const INFRA_COLORS={datacenter:"#5090ff",foodbev:"#f0b030",municipal:"#30d090",oilgas:"#f05060",lithium:"#a070f0",minerals:"#30d0d0",mining:"#c9952a",industrial:"#f070b0",chipfab:"#c8f060",power:"#ff8c42"};
  rows.forEach(r=>{if(r.infraType)infraCounts[r.infraType]=(infraCounts[r.infraType]||0)+1;});
  const maxInfra=Math.max(...Object.values(infraCounts),1);

  // ── Loss reasons ───────────────────────────────────
  const lossCounts={};
  const LOSS_LABELS={price:"Price",competitor:"Competitor",timing:"Timing",scope:"Scope",relationship:"Relationship",nodecision:"No decision"};
  lost.forEach(r=>{if(r.lossReason)lossCounts[r.lossReason]=(lossCounts[r.lossReason]||0)+1;});
  const maxLoss=Math.max(...Object.values(lossCounts),1);

  // ── Month-by-month data ────────────────────────────
  // Last 6 months
  const months=[];
  for(let i=5;i>=0;i--){
    const d=new Date();
    d.setMonth(d.getMonth()-i);
    months.push({
      label:d.toLocaleDateString("en-US",{month:"short",year:"2-digit"}),
      year:d.getFullYear(),
      month:d.getMonth()
    });
  }
  const monthlyAdded=months.map(m=>rows.filter(r=>{
    if(!r.created) return false;
    const d=new Date(r.created+"T00:00:00");
    return d.getFullYear()===m.year&&d.getMonth()===m.month;
  }).length);
  const monthlyClosed=months.map(m=>rows.filter(r=>{
    if(r.stage!=="won"&&r.stage!=="lost") return false;
    if(!r.stageChanged) return false;
    const d=new Date(r.stageChanged+"T00:00:00");
    return d.getFullYear()===m.year&&d.getMonth()===m.month;
  }).length);

  // ── Pipeline coverage ratio ────────────────────
  const PIPELINE_TARGET = getPipelineTarget();
  const totalPipe = pipe + estMid;
  const coverageRatio = PIPELINE_TARGET > 0 ? (totalPipe / PIPELINE_TARGET) : null;
  // coveragePct replaced by coverageBarPct above
  const coverageCol     = coverageRatio === null ? "#50506a" : coverageRatio >= 3 ? "#30d090" : coverageRatio >= 1.5 ? "#f0b030" : "#f05060";
  const coverageColDim  = coverageRatio === null ? "rgba(80,80,106,0.15)" : coverageRatio >= 3 ? "rgba(48,208,144,0.15)" : coverageRatio >= 1.5 ? "rgba(240,176,48,0.15)" : "rgba(240,80,96,0.15)";

function renderFunnel(){ renderFunnelInto("funnel-chart"); }

function renderFunnelInto(targetId){
  const el = document.getElementById(targetId);
  if(!el) return;

  // Active pipeline stages only - won/lost are outcomes shown separately
  const funnelStages = STAGES.filter(s=>s.k!=="won"&&s.k!=="lost");
  const counts = funnelStages.map(s=>rows.filter(r=>r.stage===s.k).length);
  const maxCount = Math.max(...counts, 1);

  // True deal outcomes
  const totalWon  = rows.filter(r=>r.stage==="won").length;
  const totalLost = rows.filter(r=>r.stage==="lost").length;
  const totalClosed = totalWon + totalLost;
  const winRate   = totalClosed > 0 ? Math.round(totalWon / totalClosed * 100) : null;
  const lostRate  = totalClosed > 0 ? Math.round(totalLost / totalClosed * 100) : null;

  // Header - remove the "% vs prev. stage" column since it was misleading
  // Replace with a simple "Active" label
  let html = `<div class="funnel-header">
    <div class="fh-stage">Stage</div>
    <div class="fh-bar"></div>
    <div class="fh-count">Active</div>
    <div class="fh-conv" style="color:var(--t2)">% of total</div>
  </div>`;

  const totalActive = counts.reduce((a,b)=>a+b,0);

  funnelStages.forEach((s,i)=>{
    const cnt    = counts[i];
    const barPct = Math.round(cnt / maxCount * 100);
    // Show each stage's share of total active pipeline
    const ofTotal = totalActive > 0 ? Math.round(cnt / totalActive * 100) + "%" : "-";
    const ofTotalCol = "var(--t2)";

    // Coloured flow arrow between stages
    // Logic: compare this stage count to the PREVIOUS stage count
    // Green  = next stage has >= 50% of current (healthy flow)
    // Amber  = next stage has 20–49% of current (slowing)
    // Red    = next stage has < 20% of current OR is 0 when current > 0 (stalled)
    // Grey   = current stage has 0 projects (nothing to flow yet)
    if(i > 0){
      const prevCnt = counts[i-1];
      let flowClass, flowMsg;
      if(prevCnt === 0){
        flowClass = "flow-grey";
        flowMsg   = "no projects at prev. stage";
      } else {
        const ratio = cnt / prevCnt;
        if(ratio >= 0.5){
          flowClass = "flow-green";
          flowMsg   = "flowing well";
        } else if(ratio >= 0.2){
          flowClass = "flow-amber";
          flowMsg   = "flow slowing";
        } else if(cnt === 0 && prevCnt > 0){
          flowClass = "flow-red";
          flowMsg   = "pipeline stalled here";
        } else {
          flowClass = "flow-red";
          flowMsg   = "low flow";
        }
      }
      html += `<div class="funnel-gap">
        <div class="funnel-gap-spacer"></div>
        <div class="funnel-gap-line ${flowClass}">
          <span class="funnel-gap-arrow">↓</span>
          <span class="funnel-gap-text">${flowMsg}</span>
        </div>
        <div class="funnel-gap-right"></div>
      </div>`;
    }

    const barLabel = cnt > 0 && barPct >= 18
      ? `<span class="fd-bar-lbl">${cnt} ${cnt===1?"project":"projects"}</span>`
      : "";

    html += `<div class="funnel-row">
      <div class="fd-stage" style="color:${s.c}">${s.l}</div>
      <div class="fd-bar-wrap">
        <div class="fd-bar" style="width:${Math.max(barPct,2)}%;background:${s.c}bb">${barLabel}</div>
      </div>
      <div class="fd-count" style="color:${s.c}">${cnt}</div>
      <div class="fd-conv" style="color:${ofTotalCol}">${ofTotal}</div>
    </div>`;
  });

  // Outcomes section - this is where real win/loss data lives
  html += `<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--b0)">
    <div style="font-size:10px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px">Deal outcomes (closed deals only)</div>
    <div style="display:flex;gap:8px;margin-bottom:10px">

function closeModal(){document.getElementById("mbg").classList.remove("open");editId=null;}
function saveProject(){
  const name=document.getElementById("fn").value.trim();
  if(!name) return;
  const tbd=vm==="tbd";
  const today = new Date().toISOString().split("T")[0];
  const existingRow = editId!==null ? rows.find(r=>r.id===editId) : null;
  const newStage = document.getElementById("fst").value;
  const stageChanged = existingRow && existingRow.stage !== newStage ? today : (existingRow?.stageChanged||today);
  const data={name,owner:document.getElementById("fo").value.trim(),stage:newStage,health:document.getElementById("fh2").value,last:document.getElementById("fl").value,note:document.getElementById("fnote").value.trim(),tbd,value:tbd?null:(parseFloat(document.getElementById("fv").value)||null),estLow:tbd?(parseFloat(document.getElementById("fel").value)||null):null,estHigh:tbd?(parseFloat(document.getElementById("feh").value)||null):null,renewal:document.getElementById("frenewal").value,deadline:document.getElementById("fdeadline").value,created:existingRow?.created||today,stageChanged,infraType:document.getElementById("finfra").value,deploymentType:document.getElementById("fdeploytype").value,lossReason:document.getElementById("flossreason").value,lossNotes:document.getElementById("flossnotes").value.trim(),nextAction:document.getElementById("fnextaction").value.trim(),followUpDate:document.getElementById("ffollowup").value};
  if(editId!==null){
    const i=rows.findIndex(r=>r.id===editId);
    rows[i]={...rows[i],...data};
    sheetWrite("update",toRow(rows[i]),i);
  } else {
    const nr={...data,id:rows.length};
    rows.push(nr);
    sheetWrite("append",toRow(nr),null);
  }
  closeModal();
  renderTable();
}
function delRow(id){
  if(!confirm("Remove this project?")) return;
  const i=rows.findIndex(r=>r.id===id);
  sheetWrite("delete",null,i);
  rows.splice(i,1);
  rows.forEach((r,i)=>r.id=i);
  renderTable();
}

function markWon(id){
  const i=rows.findIndex(r=>r.id===id);
  if(i<0) return;
  if(!confirm("Mark \""+rows[i].name+"\" as Closed Won?")) return;
  const today=new Date().toISOString().split("T")[0];
  rows[i].stage="won";
  rows[i].stageChanged=today;
  sheetWrite("update",toRow(rows[i]),i);
  renderTable();
}

function markLost(id){
  // Open the edit modal preset to Lost so reason and lessons can be captured
  openModal(id);
  document.getElementById("fst").value="lost";
  toggleLossReason();
  setTimeout(()=>{const el=document.getElementById("flossreason");if(el)el.focus();},50);
}

//  LICENSES
// ══════════════════════════════════════════════
// Licenses use a separate sheet tab called "Licenses"
// Columns: name | type | company | status | expiry | cost | note

let licenses = [], licEditId = null, licSk = "name", licSd = 1;

// Derive status automatically from expiry date if not overridden
function autoLicStatus(l){
  if(!l.expiry) return l.status || "active";
  const days = Math.round((new Date(l.expiry+"T00:00:00") - Date.now()) / 86400000);
  if(days < 0)   return "expired";
  if(days <= 60) return "expiring";
  return "active";
}

function toLicRow(l){
  return [l.name, l.type, l.company, l.status, l.expiry||"", l.cost||"", l.note];
}

// Load licenses from sheet (sheet param = "licenses")
function syncLicenses(){
  fetch(GAS_URL+"?action=get&sheet=licenses&t="+Date.now())
    .then(r=>r.json())
    .then(data=>{
      licenses=(data.rows||[]).map((r,i)=>({
        id:i,
        name:r[0]||"", type:r[1]||"Other", company:r[2]||"",
        status:r[3]||"active", expiry:normaliseDate(r[4]),
        cost:r[5]?parseFloat(r[5]):null, note:r[6]||""
      }));
      licenses.forEach(l=>l.status=autoLicStatus(l));
      renderLicenses();
    })
    .catch(()=>{});
}

function licSheetWrite(action, rowData, rowIdx){
  let url = GAS_URL+"?action="+action+"&sheet=licenses";
  if(rowData) url += "&row="+encodeURIComponent(JSON.stringify(rowData));
  if(rowIdx !== undefined && rowIdx !== null) url += "&idx="+rowIdx;
  url += "&t="+Date.now();
  fetch(url,{mode:"no-cors"}).catch(()=>{});
  setTimeout(syncLicenses, 2000);
}

function licSort(k){
  if(licSk===k) licSd*=-1; else{licSk=k;licSd=1;}
  renderLicenses();
}

function getLicFiltered(){
  const q  = document.getElementById("lsearch").value.toLowerCase();
  const fs = document.getElementById("lfs").value;
  const ft = document.getElementById("lft").value;
  return licenses.filter(l=>
    (!q || l.name.toLowerCase().includes(q) || (l.company||"").toLowerCase().includes(q)) &&
    (!fs || l.status===fs) &&
    (!ft || l.type===ft)
  ).sort((a,b)=>{
    let av=a[licSk]??"", bv=b[licSk]??"";
    if(licSk==="cost"){av=a.cost||0;bv=b.cost||0;}
    if(licSk==="expiry"){av=a.expiry||"9999";bv=b.expiry||"9999";}
    return av<bv?-licSd:av>bv?licSd:0;
  });
}

function renderLicenses(){
  // Summary cards
  const total  = licenses.length;
  const active   = licenses.filter(l=>l.status==="active").length;
  const expiring = licenses.filter(l=>l.status==="expiring").length;
  const expired  = licenses.filter(l=>l.status==="expired").length;
  const totalCost= licenses.reduce((s,l)=>s+(l.cost||0),0);
  document.getElementById("lic-summary").innerHTML=`
    <div class="kc ta"><div class="klbl"><i class="ti ti-certificate"></i>Total licenses</div><div class="kval ca sm">${total}</div></div>
    <div class="kc tg"><div class="klbl"><i class="ti ti-circle-check"></i>Active</div><div class="kval cg sm">${active}</div></div>
    <div class="kc ty"><div class="klbl"><i class="ti ti-clock-exclamation"></i>Expiring soon</div><div class="kval cy sm">${expiring}</div></div>
    <div class="kc ${expired>0?"tr":"tg"}"><div class="klbl"><i class="ti ti-alert-circle"></i>Expired</div><div class="kval ${expired>0?"cr":"cg"} sm">${expired}</div><div class="ksub">${totalCost?"Revenue: $"+Math.round(totalCost).toLocaleString():""}</div></div>
  `;

  // Sort icons
  ["name","type","company","status","expiry","cost"].forEach(k=>{
    const el=document.getElementById("lsi-"+k);
    if(!el) return;
    el.textContent = licSk===k?(licSd===1?"↑":"↓"):"↕";
    el.closest("th").classList.toggle("sorted",licSk===k);
  });

  const data = getLicFiltered();
  const tbody = document.getElementById("lictbody");
  if(!data.length){
    tbody.innerHTML=`<tr><td colspan="8"><div class="empty"><i class="ti ti-certificate"></i>${licenses.length===0?"No licenses yet - click New license to add one":"No licenses match your filters"}</div></td></tr>`;
    return;
  }
  tbody.innerHTML = data.map(l=>{
    const alert = dateAlert(l.expiry);
    const expiryHtml = alert
      ? `<span class="dl-tag ${alert.cls==="ok"?"":""+alert.cls}">${fmtDate(l.expiry)}</span>`
      : `<span style="color:var(--t2);font-size:12px">-</span>`;
    const notePreview = l.note?(l.note.length>28?l.note.slice(0,28)+"…":l.note):"-";
    return `<tr>
      <td><span class="cname">${l.name}</span></td>
      <td><span class="lic-type">${l.type}</span></td>
      <td style="color:var(--t1)">${l.company||"-"}</td>
      <td><span class="lic-status ${l.status}">${l.status[0].toUpperCase()+l.status.slice(1)}</span></td>
      <td>${expiryHtml}</td>
      <td><span class="vk">${l.cost?"$"+Number(l.cost).toLocaleString():"-"}</span></td>
      <td class="nt" title="${l.note||""}">${notePreview}</td>
      <td><div class="raction">
        <button class="ib" onclick="openLicModal(${l.id})" title="Edit"><i class="ti ti-edit"></i></button>
        <button class="ib del" onclick="delLicense(${l.id})" title="Delete"><i class="ti ti-trash"></i></button>
      </div></td>
    </tr>`;
  }).join("");
}

function openLicModal(id=null){
  licEditId=id;
  document.getElementById("lmtitle").textContent=id!==null?"Edit License":"New License";
  const l=id!==null?licenses.find(x=>x.id===id):{};
  document.getElementById("lfname").value=l.name||"";
  document.getElementById("lftype").value=l.type||"Software";
  document.getElementById("lfstatus").value=l.status||"active";
  document.getElementById("lfcompany").value=l.company||"";
  document.getElementById("lfexpiry").value=l.expiry||"";
  document.getElementById("lfcost").value=l.cost||"";
  document.getElementById("lfnote").value=l.note||"";
  document.getElementById("lmbg").classList.add("open");
}
function closeLicModal(){document.getElementById("lmbg").classList.remove("open");licEditId=null;}

function saveLicense(){
  const name=document.getElementById("lfname").value.trim();
  if(!name) return;
  const data={
    name, type:document.getElementById("lftype").value,
    company:document.getElementById("lfcompany").value.trim(),
    status:document.getElementById("lfstatus").value,
    expiry:document.getElementById("lfexpiry").value,
    cost:parseFloat(document.getElementById("lfcost").value)||null,
    note:document.getElementById("lfnote").value.trim()
  };
  data.status = autoLicStatus({...data});
  if(licEditId!==null){
    const i=licenses.findIndex(l=>l.id===licEditId);
    licenses[i]={...licenses[i],...data};
    licSheetWrite("update",toLicRow(licenses[i]),i);
  } else {
    const nl={...data,id:licenses.length};
    licenses.push(nl);
    licSheetWrite("append",toLicRow(nl),null);
  }
  closeLicModal();
  renderLicenses();
}

function delLicense(id){
  if(!confirm("Remove this license?")) return;
  const i=licenses.findIndex(l=>l.id===id);
  licSheetWrite("delete",null,i);
  licenses.splice(i,1);
  licenses.forEach((l,i)=>l.id=i);
  renderLicenses();
}

  const expired   = licenses.filter(l=>l.status==="expired");
  const totalCost = licenses.reduce((s,l)=>s+(l.cost||0),0);
  const expCost   = expiring.reduce((s,l)=>s+(l.cost||0),0);
  const byType    = {};
  licenses.forEach(l=>{byType[l.type]=(byType[l.type]||0)+1;});
  const maxType   = Math.max(...Object.values(byType),1);
  const typeColors= {Software:"#5090ff",Hardware:"#30d0d0",Regulatory:"#a070f0",Compliance:"#f0b030",Operational:"#30d090",Other:"#4A6280"};

  // Expiry tier buckets - only active/expiring licenses with an expiry date
  function daysToExpiry(l){
    if(!l.expiry) return null;
    return Math.round((new Date(l.expiry+"T00:00:00") - Date.now()) / 86400000);
  }
  const withExpiry = licenses.filter(l=>l.expiry && l.status!=="expired")
    .map(l=>({...l, daysLeft:daysToExpiry(l)}))
    .filter(l=>l.daysLeft!==null && l.daysLeft>=0)
    .sort((a,b)=>a.daysLeft-b.daysLeft);

  const tier30  = withExpiry.filter(l=>l.daysLeft<=30);

  const tier180 = withExpiry.filter(l=>l.daysLeft>90  && l.daysLeft<=180);

// ── Board print & theme ──────────────────────────────────────────────────────
// boardLightTheme declared in glue script

async function doPrint(){
  const btn   = document.getElementById("export-btn");
  const icon  = document.getElementById("export-icon");
  const label = document.getElementById("export-label");

  btn.disabled = true;
  icon.className = "ti ti-loader-2";
  icon.style.animation = "rot 0.9s linear infinite";
  label.textContent = "Generating PDF…";

  try {
    const { jsPDF } = window.jspdf;
    const boardEl = document.getElementById("board-content");

    // Expand body so html2canvas can see everything
    const origOverflow = document.body.style.overflow;
    document.body.style.overflow = "visible";

    // Hide the export buttons during capture
    const exportRow = document.querySelector(".board-export-row");
    if(exportRow) exportRow.style.visibility = "hidden";

    // Capture the full element at 1.5x for a good quality/size balance
    const canvas = await html2canvas(boardEl, {
      scale: 1.5,
      useCORS: true,
      allowTaint: true,
      backgroundColor: boardLightTheme ? "#ffffff" : "#07090D",
      scrollX: 0,
      scrollY: 0,
      x: 0,
      y: 0,
      width:  boardEl.scrollWidth,
      height: boardEl.scrollHeight,
      windowWidth:  boardEl.scrollWidth,
      windowHeight: boardEl.scrollHeight,
      logging: false
    });

    // Restore
    document.body.style.overflow = origOverflow;
    if(exportRow) exportRow.style.visibility = "visible";

    // --- Single page sized exactly to the content ---
    // Work in mm. Target width = 280mm (A4 landscape width minus margins).
    const targetWidthMm  = 280;
    const mmPerPx        = targetWidthMm / canvas.width;
    const contentHeightMm = canvas.height * mmPerPx;

    // Create a custom-sized single page PDF
    const pdf = new jsPDF({
      orientation: contentHeightMm > targetWidthMm ? "portrait" : "landscape",
      unit: "mm",
      format: [targetWidthMm, contentHeightMm]
    });

    // Place the full canvas image on the single page - no slicing, no pagination
    const imgData = canvas.toDataURL("image/jpeg", 0.95);
    pdf.addImage(imgData, "JPEG", 0, 0, targetWidthMm, contentHeightMm);

    const date = new Date().toLocaleDateString("en-GB").replace(/\//g, "-");
    pdf.save("KMX-Board-Pack-" + date + ".pdf");

  } catch(err) {
    console.error("PDF export error:", err);
    alert("PDF export failed - please try again.");
  }

  btn.disabled = false;
  icon.className = "ti ti-file-type-pdf";
  icon.style.animation = "";
  label.textContent = "Download PDF";
}

document.getElementById("date-tag").textContent =
  new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"});

const PAGE_META = {
  projects: {crumb:"Pipeline",  title:"Projects",         btn:true,  btnFn:"openModal()"},
  dash:     {crumb:"Pipeline",  title:"Dashboard",        btn:false},
  licenses: {crumb:"Licenses",  title:"License Registry", btn:false},
  licdash:  {crumb:"Licenses",  title:"Analytics",        btn:false},
  board:    {crumb:"Executive", title:"Board View",       btn:false},
};

// Light theme
let boardLightTheme = false;
function toggleBoardTheme() {
  boardLightTheme = !boardLightTheme;
  document.body.classList.toggle("light-theme", boardLightTheme);
  // Update ALL theme toggles across all pages
  document.querySelectorAll(".theme-icon").forEach(el => {
    el.className = boardLightTheme ? "ti ti-moon" : "ti ti-sun";
  });
  document.querySelectorAll(".theme-label").forEach(el => {
    el.textContent = boardLightTheme ? "Dark theme" : "Light theme";
  });
}

// PDF export
async function doPrint() {
  const btn = document.getElementById("export-btn");
  const icon = document.getElementById("export-icon");
  const lbl  = document.getElementById("export-label");
  btn.disabled = true;
  icon.className = "ti ti-loader-2";
  icon.style.animation = "rot .9s linear infinite";
  lbl.textContent = "Generating…";
  try {
    const {jsPDF} = window.jspdf;
    const el = document.getElementById("board-content");
    const origOv = document.body.style.overflow;
    document.body.style.overflow = "visible";
    const row = document.querySelector(".board-export-row");
    if (row) row.style.visibility = "hidden";
    const canvas = await html2canvas(el, {
      scale:1.5, useCORS:true, allowTaint:true,
      backgroundColor: boardLightTheme ? "#F2F5F8" : "#07090D",
      scrollX:0, scrollY:0,
      width:el.scrollWidth, height:el.scrollHeight,
      windowWidth:el.scrollWidth, windowHeight:el.scrollHeight,
      logging:false
    });
    document.body.style.overflow = origOv;
    if (row) row.style.visibility = "visible";
    const W = 280, mmPx = W / canvas.width, H = canvas.height * mmPx;
    const pdf = new jsPDF({
      orientation: H > W ? "portrait" : "landscape",
      unit:"mm", format:[W, H]
    });
    pdf.addImage(canvas.toDataURL("image/jpeg",.95),"JPEG",0,0,W,H);
    pdf.save("KMX-Board-Pack-" + new Date().toLocaleDateString("en-GB").replace(/\//g,"-") + ".pdf");
  } catch(e) { console.error(e); alert("PDF export failed - try again."); }
  btn.disabled = false;
  icon.className = "ti ti-file-type-pdf";
  icon.style.animation = "";
  lbl.textContent = "Download PDF";
}
</script>
